<svg width="480" height="220" viewBox="0 0 480 220" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="sBg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#160330"/>
    <stop offset="100%" stop-color="#26074f"/>
  </linearGradient>
  <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#ff4fd8"/>
    <stop offset="100%" stop-color="#7b2ff7"/>
  </linearGradient>
</defs>
<rect width="480" height="220" rx="16" fill="url(#sBg)" stroke="#4d1a80"/>
<text x="24" y="34" font-family="Verdana" font-size="18" font-weight="bold" fill="#f1e6ff">Rana's GitHub Stats</text>

<!-- rank ring -->
<g transform="translate(90,130)">
  <circle r="60" fill="none" stroke="#2a0a4d" stroke-width="12"/>
  <circle r="60" fill="none" stroke="url(#ringGrad)" stroke-width="12" stroke-linecap="round"
    stroke-dasharray="377" stroke-dashoffset="377" transform="rotate(-90)">
    <animate attributeName="stroke-dashoffset" values="377;60" dur="1.8s" begin="0.3s" fill="freeze"/>
  </circle>
  <text text-anchor="middle" y="10" font-family="Verdana" font-size="30" font-weight="bold" fill="#ffffff">A+</text>
</g>

<!-- stat rows -->
<g font-family="Verdana" font-size="14" fill="#e0d7f5">
  <text x="200" y="70">Total Stars</text>
  <rect x="200" y="78" width="0" height="10" rx="5" fill="url(#ringGrad)"><animate attributeName="width" values="0;120" dur="1.2s" begin="0.4s" fill="freeze"/></rect>
  <text x="335" y="88" fill="#c9a6f0">42</text>

  <text x="200" y="112">Total Commits</text>
  <rect x="200" y="120" width="0" height="10" rx="5" fill="url(#ringGrad)"><animate attributeName="width" values="0;190" dur="1.2s" begin="0.6s" fill="freeze"/></rect>
  <text x="405" y="130" fill="#c9a6f0">380</text>

  <text x="200" y="154">Pull Requests</text>
  <rect x="200" y="162" width="0" height="10" rx="5" fill="url(#ringGrad)"><animate attributeName="width" values="0;70" dur="1.2s" begin="0.8s" fill="freeze"/></rect>
  <text x="285" y="172" fill="#c9a6f0">15</text>

  <text x="200" y="196">Contributed To</text>
  <rect x="200" y="204" width="0" height="10" rx="5" fill="url(#ringGrad)"><animate attributeName="width" values="0;50" dur="1.2s" begin="1.0s" fill="freeze"/></rect>
  <text x="265" y="214" fill="#c9a6f0">6</text>
</g>
<!-- Note: numbers above are placeholders — edit the width/text values as your real stats grow -->
</svg>
