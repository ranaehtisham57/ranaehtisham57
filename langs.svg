<svg width="420" height="220" viewBox="0 0 420 220" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="lBg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#160330"/>
    <stop offset="100%" stop-color="#26074f"/>
  </linearGradient>
</defs>
<rect width="420" height="220" rx="16" fill="url(#lBg)" stroke="#4d1a80"/>
<text x="24" y="34" font-family="Verdana" font-size="18" font-weight="bold" fill="#f1e6ff">Most Used Languages</text>

<g font-family="Verdana" font-size="13" fill="#e0d7f5">
  <text x="24" y="66">Python</text>
  <rect x="24" y="72" width="0" height="10" rx="5" fill="#3572A5"><animate attributeName="width" values="0;300" dur="1.1s" begin="0.2s" fill="freeze"/></rect>
  <text x="335" y="82" fill="#c9a6f0">42%</text>

  <text x="24" y="102">C++</text>
  <rect x="24" y="108" width="0" height="10" rx="5" fill="#f34b7d"><animate attributeName="width" values="0;190" dur="1.1s" begin="0.35s" fill="freeze"/></rect>
  <text x="225" y="118" fill="#c9a6f0">27%</text>

  <text x="24" y="138">SQL</text>
  <rect x="24" y="144" width="0" height="10" rx="5" fill="#e38c00"><animate attributeName="width" values="0;110" dur="1.1s" begin="0.5s" fill="freeze"/></rect>
  <text x="145" y="154" fill="#c9a6f0">15%</text>

  <text x="24" y="174">JavaScript</text>
  <rect x="24" y="180" width="0" height="10" rx="5" fill="#f1e05a"><animate attributeName="width" values="0;80" dur="1.1s" begin="0.65s" fill="freeze"/></rect>
  <text x="115" y="190" fill="#c9a6f0">11%</text>

  <text x="24" y="204">HTML/CSS</text>
  <rect x="150" y="204" width="0" height="10" rx="5" fill="#e34c26"><animate attributeName="width" values="0;40" dur="1.1s" begin="0.8s" fill="freeze"/></rect>
  <text x="200" y="214" fill="#c9a6f0">5%</text>
</g>
<!-- Note: percentages above are placeholders — swap in your real language stats -->
</svg>
